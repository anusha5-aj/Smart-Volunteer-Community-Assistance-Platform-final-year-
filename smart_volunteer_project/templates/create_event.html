<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | Smart Volunteer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-indigo-50/30 min-h-screen py-10 px-6">
    <div class="max-w-2xl mx-auto">
        <div class="mb-8">
            <a href="{{ url_for('ngo_dashboard') }}" class="text-indigo-600 font-bold flex items-center hover:opacity-70 transition-opacity">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Dashboard
            </a>
        </div>

        <div class="glass-card p-10 shadow-2xl bg-white divide-y divide-slate-100">
            <div class="pb-8">
                <h1 class="text-3xl font-extrabold text-slate-900">Host an Event</h1>
                <p class="text-slate-500 mt-2">Create a new opportunity for community volunteers.</p>
            </div>

            <form action="{{ url_for('create_event') }}" method="POST" class="pt-8 space-y-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Event Title</label>
                    <input type="text" name="event_title" required placeholder="e.g. Weekend Beach Cleanup" 
                        class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Target Date</label>
                        <input type="date" name="event_date" required 
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Location</label>
                        <input type="text" name="location" required placeholder="e.g. Regional Park" 
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Start Time</label>
                        <input type="time" name="start_time" required 
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">End Time</label>
                        <input type="time" name="end_time" required 
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Required Volunteers</label>
                        <input type="number" name="volunteer_limit" min="1" required placeholder="e.g. 10" 
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Required Skills (comma separated)</label>
                    <input type="text" name="required_skills" required placeholder="e.g. Communication, Painting, Teaching" 
                        class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all">
                    <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-widest">Our AI will match volunteers based on these tags.</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Description</label>
                    <textarea name="description" rows="5" required placeholder="Tell volunteers about the event goals and what they will be doing..." 
                        class="w-full px-4 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 transition-all"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full gradient-bg text-white font-extrabold py-5 rounded-2xl shadow-xl hover:scale-[1.02] transition-transform">
                        Launch Event
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
